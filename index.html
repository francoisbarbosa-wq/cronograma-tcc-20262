*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f5f5f5;color:#222;padding:20px}
h1{font-size:18px;margin-bottom:4px;color:#1a3a5c}
.sub{font-size:12px;color:#666;margin-bottom:16px}
.top-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.top-bar input,.top-bar select{font-size:12px;padding:5px 9px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#222;height:32px}

.badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#e8e8e8;color:#555;white-space:nowrap}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;font-size:11px;color:#666}
.leg{display:flex;align-items:center;gap:5px}
.dot-ok{width:14px;height:14px;border-radius:50%;background:#4CAF50;border:2px solid #2e7d32}
.dot-pend{width:14px;height:14px;border-radius:50%;background:#FFC107;border:2px solid #f57f17}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
thead th{font-size:11px;font-weight:600;color:#555;text-align:left;padding:7px 8px;background:#f0f0f0;border-bottom:1px solid #ddd;white-space:nowrap}
tbody tr{border-bottom:1px solid #eee}
tbody tr:hover{background:#fafafa}
tbody td{padding:7px 8px;vertical-align:top;font-size:12px}
.day-sep{background:#e8f0f8!important}
.day-sep td{font-size:11px;font-weight:700;color:#1a3a5c;padding:5px 8px;border-bottom:1px solid #c5d8ee}
.hora{font-weight:700;color:#1565c0;white-space:nowrap;width:52px}
.auth-ok{display:inline-block;width:22px;height:22px;border-radius:50%;background:#E8F5E9;border:2px solid #4CAF50;text-align:center;line-height:20px;font-size:13px}
.auth-pend{display:inline-block;width:22px;height:22px;border-radius:50%;background:#FFF8E1;border:2px solid #FFC107;text-align:center;line-height:20px;font-size:12px}
.meet{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7;white-space:nowrap}
.fab{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:#e3f2fd;color:#0d47a1;border:1px solid #90caf9;white-space:nowrap}
.ca{width:15%}
.ct{width:28%}
.co{width:15%}
.cv{width:18%}
.cl{width:70px}
.cau{width:40px;text-align:center}
</style>
</head>
<body>

<div class="top-bar">

  <select id="fData" onchange="render()"><option value="">Todas as datas</option></select>
  <select id="fLocal" onchange="render()">
    <option value="">Todos os locais</option>
    <option value="fab">Fábrica de Inovação</option>
    <option value="meet">Google Meet</option>
  </select>
  <select id="fAuth" onchange="render()">
    <option value="">Todas as autorizações</option>
    <option value="ok">Autorizado ✓</option>
    <option value="pend">Aguardando ⏳</option>

  <span class="badge" id="count">0 defesas</span>
</div>

<div class="legend">
  <div class="leg"><span class="dot-ok"></span> Autorizado</div>
  <div class="leg"><span class="dot-pend"></span> Aguardando autorização</div>
</div>

<table>

  <th class="co">Orientador(a)</th>
  <th class="cv">Avaliadores</th>
  <th class="cl">Local</th>
  <th class="cau">Auth.</th>

<tbody id="tbody"></tbody>
</table>

function toKey(d){const[dd,mm,yyyy]=d.split('/');return`${yyyy}-${mm}-${dd}`}
function wd(d){const[dd,mm,yyyy]=d.split('/');return['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'][new Date(`${yyyy}-${mm}-${dd}`).getDay()]}

const sel=document.getElementById('fData');
[...new Set(raw.map(r=>r.data))].sort((a,b)=>toKey(a).localeCompare(toKey(b))).forEach(d=>{
  const o=document.createElement('option');o.value=d;o.textContent=`${d} (${wd(d)})`;sel.appendChild(o);
});

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const fd=document.getElementById('fData').value;
  const fl=document.getElementById('fLocal').value;
  const fa=document.getElementById('fAuth').value;
  const f=raw.filter(r=>{
    const t=`${r.aluno} ${r.titulo} ${r.orientador} ${r.aval1} ${r.aval2}`.toLowerCase();
    return(!q||t.includes(q))&&(!fd||r.data===fd)&&(!fl||(fl==='fab'&&r.local==='fab')||(fl==='meet'&&r.local==='meet'))&&(!fa||(fa==='ok'&&r.auth)||(fa==='pend'&&!r.auth));
  });
  document.getElementById('count').textContent=`${f.length} defesa${f.length!==1?'s':''}`;
  const g={};f.forEach(r=>{if(!g[r.data])g[r.data]=[];g[r.data].push(r);});
  const dates=Object.keys(g).sort((a,b)=>toKey(a).localeCompare(toKey(b)));
  document.getElementById('tbody').innerHTML=dates.map(d=>{
    const its=g[d];
    return`<tr class="day-sep"><td colspan="7">📅 ${d} — ${wd(d)} · ${its.length} defesa${its.length>1?'s':''}</td></tr>`
    +its.map(r=>`<tr>
      <td class="hora">${r.hora}</td>
      <td class="ca" title="${r.aluno}">${r.aluno}</td>
      <td class="ct" title="${r.titulo}">${r.titulo}</td>
      <td class="co" title="${r.orientador}">${r.orientador}</td>
      <td class="cv" title="${r.aval1} / ${r.aval2}" style="color:#555">${r.aval1}<br>${r.aval2}</td>
      <td class="cl">${r.local==='meet'?'<span class="meet">📹 Meet</span>':'<span class="fab">🏢 Fábrica</span>'}</td>
      <td class="cau">${r.auth?'<span class="auth-ok">✓</span>':'<span class="auth-pend">⏳</span>'}</td>
    </tr>`).join('');
  }).join('');
}
render();
</script>
